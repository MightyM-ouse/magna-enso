name: Governance validation

# CF-1 / AC #2: validate the main PR and stacked correction/review PRs. Branch filters apply
# to the PR base branch; this does not change branch-protection on `main`.
on:
  pull_request:
    branches:
      - main
      - 'codex/**'
      - 'claude/**'
      - 'chatgpt/**'
      - 'antigravity/**'
      - 'architect/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate TRACE JSON
        run: python3 -m json.tool trace/CELESTIAL_INDEX.json >/dev/null

      - name: Validate TRACE YAML
        run: |
          ruby -ryaml -e '
            %w[
              trace/TRACE_CONFIG.yaml
              trace/ROLE_REGISTRY.yaml
              trace/WORKFLOWS.yaml
            ].each { |path| YAML.load_file(path); puts "valid #{path}" }
          '

      # CF-1 / AC #3: explicitly check the GOV-005 canonical governance files (in addition to
      # the GOV-001-era baseline files).
      - name: Check required governance files
        run: |
          test -f AGENTS.md
          test -f docs/governance/SOURCE_OF_TRUTH.md
          test -f docs/governance/MULTI_AGENT_OPERATING_MODEL.md
          test -f trace/tasks/GOV-001.md
          test -f trace/evidence/GOV-001_LIGHT_CURVE.md
          test -f docs/governance/MULTI_AGENT_EXECUTION_POLICY.md
          test -f trace/ACTIVE_WORK_REGISTRY.yaml
          test -f trace/schemas/agent_handoff.schema.json
          test -f scripts/validate_multi_agent_governance.py
          test -f scripts/check_changed_path_ownership.py
          test -f scripts/governance-requirements.txt

      # CF-1 / NB-1: install the narrowly scoped, pinned governance dependency.
      - name: Install governance Python dependency
        run: python3 -m pip install --user -r scripts/governance-requirements.txt

      # CF-1 / AC #1: run the substantive GOV-005 validator; it fails the job on a real
      # contract violation.
      - name: Run GOV-005 governance validator
        run: python3 scripts/validate_multi_agent_governance.py

      # CF-5 (hardened): task-specific changed-path ownership against the PR base branch.
      # --branch identifies the ONE accountable active task (the PR head branch); the checker
      # validates the change set against only that task's envelope and validates changed
      # governed handoffs. Fails closed on missing/ambiguous/inactive task identity.
      - name: Changed-path ownership check
        if: github.event_name == 'pull_request'
        run: >-
          python3 scripts/check_changed_path_ownership.py
          --base "origin/${{ github.base_ref }}"
          --branch "${{ github.head_ref }}"

      - name: Install pinned Gitleaks
        env:
          VERSION: "8.30.1"
          EXPECTED_SHA: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          mkdir -p "$RUNNER_TEMP/gitleaks"
          curl --fail --location --silent --show-error --retry 3 \
            --output "$RUNNER_TEMP/gitleaks/gitleaks.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          echo "${EXPECTED_SHA}  $RUNNER_TEMP/gitleaks/gitleaks.tar.gz" | sha256sum --check
          tar -xzf "$RUNNER_TEMP/gitleaks/gitleaks.tar.gz" -C "$RUNNER_TEMP/gitleaks" gitleaks
          "$RUNNER_TEMP/gitleaks/gitleaks" version

      - name: Scan branch history for secrets
        run: "$RUNNER_TEMP/gitleaks/gitleaks git . --redact --no-banner"
