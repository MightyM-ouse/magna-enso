modes:
  discovery:
    flow: [verify_repository, identify_task, route_context, resolve_missing_information, propose]
    outputs: [findings, options, decisions_required]
  investigation:
    flow: [preflight, reproduce, gather_evidence, test_hypotheses, identify_root_cause]
    outputs: [evidence, root_cause, confidence, recommendation]
  execution:
    flow: [preflight, confirm_scope, implement, validate, capture_evidence, push_task_branch]
    outputs: [changes, checks, evidence, draft_pull_request]
  review:
    flow: [verify_scope, inspect_diff, inspect_evidence, assess_risk, issue_verdict]
    outputs: [findings, verdict, residual_risk]
  mixed:
    flow: [discovery, investigation, execution, review]
    outputs: [mode_history, evidence_chain, final_status]

git:
  direct_push_main: forbidden
  force_push: forbidden
  shared_mutable_agent_branch: forbidden
  assigned_task_branch_commit: task_packet_authorized
  assigned_task_branch_push: task_packet_authorized
  pull_request: required
  merge_method: squash
  merge_authority: product_owner
  resolve_review_conversations: required

evidence:
  task_packet: required
  light_curve: required_for_meaningful_work
  exact_failures_visible: true
  large_raw_outputs: github_actions_artifact
  curated_outputs: repository

closure_requires:
  - acceptance_criteria_accounted_for
  - checks_recorded
  - light_curve_updated
  - material_decisions_logged
  - independent_review_when_required
  - product_owner_merge_or_explicit_rejection

