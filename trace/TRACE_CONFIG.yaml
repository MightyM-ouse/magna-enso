trace_version: "1.0"

project:
  name: "magna-enso"
  positioning: "First operational stage of Magna"
  profile: "ai_project_regulated_leaning"
  release_target: "v1.0-enso"
  repository: "MightyM-ouse/magna-enso"
  canonical_source: "github"

operating_model:
  methodology: "TRACE"
  default_mode: "mixed"
  supported_modes: [discovery, investigation, execution, review, mixed]
  protected_branch: "main"
  task_branch_required: true
  pull_request_required: true
  squash_merge_only: true
  worker_self_merge: false

context:
  minimal_context: true
  require_context_route: true
  allow_full_repo_scan: false
  verify_github_before_current_state_claims: true

human_authority:
  final_authority: "product_owner"
  approval_required_for:
    - product_scope
    - functional_acceptance
    - risk_acceptance
    - merge
    - release
    - capability_activation
    - public_runtime_exposure
  task_packet_may_authorize:
    - scoped_file_modification
    - commit_to_assigned_branch
    - push_to_assigned_branch

posture:
  local_first: true
  lan_first: true
  public_source_repository: true
  public_runtime_exposure_default: false
  cloud_execution_default: false
  hidden_autonomous_execution: false
  silent_memory_mutation: false
  auto_skill_activation: false

boundaries:
  helix: "read_only_doctrine_and_observability"
  hermes_runtime: "inactive_pending_governed_capability_lab"
  sprint_5_local_work: "untracked_unaccepted"
  sgn_01: "blocked"
  future_stages: "separate_repositories"

artifacts:
  status_file: "trace/STAR_MAP.md"
  context_index: "trace/CELESTIAL_INDEX.json"
  role_registry: "trace/ROLE_REGISTRY.yaml"
  workflows: "trace/WORKFLOWS.yaml"
  task_dir: "trace/tasks/"
  evidence_dir: "trace/evidence/"
  decision_log: "trace/DECISION_LOG.md"
  governance_dir: "docs/governance/"

