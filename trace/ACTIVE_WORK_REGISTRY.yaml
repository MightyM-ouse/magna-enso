# CF-2 (AC #4): the live GitHub branch head is the synchronization authority. Per-task
# `latest_known_commit` is a point-in-time pointer recorded when an entry was last written;
# it is never required to equal the commit that contains this file (impossible self-reference)
# and must not be read as a freshness guarantee. Always reconcile against the live branch head.
synchronization_authority: live_github_branch_head

# CF-3 (AC #5): one canonical live task-status authority, with explicit roles for the other
# status surfaces so they cannot silently disagree.
status_authority:
  canonical_live_status: "trace/ACTIVE_WORK_REGISTRY.yaml (active_tasks[].status)"
  immutable_task_status: "trace/tasks/<TASK>.md (frozen at publication; historical, not live)"
  human_summary: "trace/STAR_MAP.md (narrative; mirrors the live status, not authoritative)"
  handoff_status: "handoff task.status (point-in-time snapshot at handoff)"
  vocabulary_source: status_vocabulary

status_vocabulary:
  - PLANNED
  - AUTHORIZED
  - IN_PROGRESS
  - BLOCKED
  - PUSHED_FOR_REVIEW
  - CHANGES_REQUIRED
  - READY_FOR_PRODUCT_OWNER
  - MERGED
  - CLOSED

ownership_rules:
  writable_paths_exclusive: true
  overlapping_write_requires_recorded_resolution: true
  task_packet_immutable_after_in_progress: true
  assigned_branch_only: true
  main_merge_authority: product_owner

