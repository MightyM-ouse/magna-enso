meta:
  enforcement: "repository_rules_plus_task_scope"
  human_override: true
  final_authority: "product_owner"

roles:
  product_owner:
    worker: "vinay"
    responsibilities: [scope, priority, functional_acceptance, risk_acceptance, merge, release]
    must_not: [replace_technical_evidence_with_manual_assertion]

  system_architect_sme:
    worker: "chatgpt"
    modes: [discovery, review, mixed]
    can_modify: [governance_docs, architecture_docs, task_packets, review_artifacts]
    must_not: [merge, self_accept, invent_state, make_binding_product_decisions]

  architecture_specification:
    worker: "claude"
    modes: [discovery, review, mixed]
    can_modify: [assigned_docs, assigned_configuration, explicitly_assigned_code]
    must_not: [self_approve, merge, silently_change_scope]

  builder:
    worker: "codex"
    modes: [execution, investigation]
    can_modify: [task_packet_allowed_scope]
    must_not: [push_main, merge, self_accept, bypass_policy, activate_unapproved_capabilities]

  independent_validator:
    worker: "antigravity"
    modes: [review, investigation]
    can_modify: [validation_artifacts, explicitly_assigned_corrections]
    must_not: [implement_feature_under_review, self_approve, merge, use_unverified_paths]

  governed_runtime_experiment:
    worker: "hermes"
    status: "inactive"
    modes: [execution, review]
    can_modify: []
    activation_requires: [approved_task, isolated_runtime, policy_gate, audit_before_effect, independent_review]
    must_not: [self_enable_tools, silent_memory_write, external_action, repository_write]

