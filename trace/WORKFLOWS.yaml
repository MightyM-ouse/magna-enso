# WORKFLOWS.yaml — Orbital Paths (Magna Enso)
# Governed movement through work states. Source: ../planning/TRACE_ADOPTION_PLAN_FOR_MAGNA_ENSO.md
# Modes may switch dynamically within one task (same Task ID; mode history preserved).

modes:
  discovery:
    purpose: "Configure/plan: establish context and produce/extend TRACE artifacts."
    flow: [initialize, read_available_files, ask_only_missing_questions, produce_artifacts, validate_readiness]
    expected_output: [plan_or_artifacts, decisions_logged]

  investigation:
    purpose: "Find root cause before changing anything."
    flow: [observe_symptom, route_context, gather_evidence, build_hypotheses, validate_hypotheses, identify_root_cause, recommend_next]
    expected_output: [symptom, hypotheses_with_evidence, root_cause_confidence, recommended_action, should_switch_to_execution]

  execution:
    purpose: "Implement a scoped change."
    flow: [confirm_goal, load_context_route, inspect_current_state, implement_change, run_checks, prepare_evidence, update_status]
    expected_output: [implementation_summary, files_changed, validation_results, risks, light_curve]

  review:
    purpose: "Assess proposed changes or evidence."
    flow: [inspect_task_packet, inspect_changed_files, inspect_evidence, assess_risk, recommend]
    expected_output: [findings, risk_classification, recommendation]   # approve / reject / follow-up

  mixed:
    purpose: "Realistic engineering loop across modes."
    flow: [investigate, execute, review, close]
    expected_output: [mode_history, evidence_chain, final_status]

dynamic_switching:
  same_task_id: true
  preserve: [mode_history, evidence_chain, context_route_changes, status_updates]

gates:
  # Hard human-approval gates (frozen Sprint 0). These MAY block.
  before_commit: human_approval_required
  before_push: human_approval_required
  before_capability_activation: human_approval_required
  before_memory_write: human_approval_required
  before_skill_activation: human_approval_required
  before_network_exposure: human_approval_required
  before_dependency_change: human_approval_required

evidence:
  every_meaningful_task: "light_curve"   # written to trace/evidence/
  levels: [light, standard, full]
  merge_to_main: "requires human-reviewed review-package"

closure_requires:
  - star_map_updated
  - light_curve_written
  - material_decisions_logged_to_event_horizon
  - human_approval_for_material_actions
